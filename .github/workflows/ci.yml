name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run all tests
        run: cargo test --workspace --all-targets

      - name: Check benchmarks compile
        run: cargo check --benches

      - name: Count and report total tests
        run: |
          echo "=== Test Count Summary ==="
          cargo test --workspace --lib -- --list 2>&1 | tail -3
          echo ""
          echo "=== E2E Tests ==="
          cargo test --test '*' -- --list 2>&1 | tail -3 || true

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (allow pre-existing warnings baseline)
        run: |
          echo "=== Clippy with baseline allow-list ==="
          cargo clippy --workspace --all-targets -- \
            -W clippy::all \
            -A dead_code \
            -A unused_imports \
            -A unused_variables \
            -A unused_mut \
            -A unused_assignments \
            -A unused_must_use \
            -A unreachable_pub
          echo ""
          echo "=== Warning count (should be ~36 pre-existing) ==="
          WARN_COUNT=$(cargo clippy --workspace --all-targets 2>&1 | grep -c "warning\[" || echo "0")
          echo "Total warnings: $WARN_COUNT"
          if [ "$WARN_COUNT" -gt 50 ]; then
            echo "::error::Warning count ($WARN_COUNT) exceeds threshold (50). New warnings may have been introduced."
            exit 1
          fi
          echo "::notice::Clippy passed with $WARN_COUNT warnings (baseline: ~36)"

      - name: Format check
        run: cargo fmt --all -- --check

  p2-module-tests:
    name: P0-P2 Module Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Auth module (Task 10)
        run: "cargo test --lib auth::"

      - name: LPD module (Task 11)
        run: cargo test --lib engine::lpd_

      - name: MSE handshake (Task 12)
        run: cargo test --lib engine::bt_mse

      - name: Stream filter (Task 8)
        run: cargo test --lib http::stream_filter

      - name: BT progress persistence (Task 6)
        run: cargo test --lib engine::bt_progress

      - name: Post-download hooks (Task 7)
        run: cargo test --lib engine::bt_post_download

      - name: HTTP connection (P0-T1)
        run: cargo test --lib http::connection

      - name: HTTP request/response (P0-T2)
        run: cargo test --lib http::request_response

      - name: FTP connection (P0-T3)
        run: cargo test --lib ftp::connection

      - name: Option validator (P0-T4)
        run: cargo test --lib config::option_validator

      - name: BT integration (P3-TaskB)
        run: cargo test --lib engine::bt_integration

  test-count-gate:
    name: Test Count Trend Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify minimum test count
        run: |
          LIB_COUNT=$(cargo test --workspace --lib -- --list 2>&1 | grep -c "^ *test" || echo "0")
          E2E_COUNT=$(cargo test --test '*' -- --list 2>&1 | grep -c "^ *test" || echo "0")
          TOTAL=$((LIB_COUNT + E2E_COUNT))
          
          MINIMUM=650
          BASELINE=671
          
          echo "=== Test Count Gate ==="
          echo "Lib tests: $LIB_COUNT"
          echo "E2E tests: $E2E_COUNT"
          echo "Total:     $TOTAL"
          echo "Minimum:    $MINIMUM"
          echo "Baseline:   $BASELINE"
          
          if [ "$TOTAL" -lt "$MINIMUM" ]; then
            echo "::error::Test count ($TOTAL) is below minimum threshold ($MINIMUM)"
            exit 1
          fi
          
          if [ "$TOTAL" -lt "$BASELINE" ]; then
            echo "::notice::Test count ($TOTAL) is below baseline ($BASELINE), some tests may be missing"
          else
            echo "::notice::Test count trend: $TOTAL >= $BASELINE ✅"
          fi

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run P0 benchmarks
        run: |
          cargo bench --bench config_bench -- --nocapture 2>&1 | tee p0_bench.txt || true

      - name: Run P2 benchmarks
        run: |
          cargo bench --bench p2_bench -- --nocapture 2>&1 | tee p2_bench.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: *.txt
          retention-days: 90

  python-test:
    name: Python SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd bindings/python
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          cd bindings/python
          pytest tests/unit/ -v --cov=aria2_rust_client

      - name: Run integration tests
        run: |
          cd bindings/python
          pytest tests/integration/ -v

      - name: Run E2E tests (optional)
        run: |
          cd bindings/python
          pytest tests/e2e/ -v || true

      - name: Type checking (optional)
        run: |
          cd bindings/python
          pip install mypy
          mypy aria2_rust_client || true

  nodejs-test:
    name: Node.js SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd bindings/nodejs
          npm install

      - name: Run unit tests
        run: |
          cd bindings/nodejs
          npm run test:unit

      - name: Run integration tests
        run: |
          cd bindings/nodejs
          npm run test:integration

      - name: Run E2E tests (optional)
        run: |
          cd bindings/nodejs
          npm run test:e2e || true

      - name: Type checking
        run: |
          cd bindings/nodejs
          npm run typecheck

      - name: Build
        run: |
          cd bindings/nodejs
          npm run build

  publish-python:
    name: Publish Python SDK to PyPI
    needs: [test, python-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install build tools
        run: |
          cd bindings/python
          pip install build twine
      
      - name: Build package
        run: |
          cd bindings/python
          python -m build
      
      - name: Publish to PyPI
        run: |
          cd bindings/python
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-nodejs:
    name: Publish Node.js SDK to NPM
    needs: [test, nodejs-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: |
          cd bindings/nodejs
          npm install
      
      - name: Build package
        run: |
          cd bindings/nodejs
          npm run build
      
      - name: Publish to NPM
        run: |
          cd bindings/nodejs
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
